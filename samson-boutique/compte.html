<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon compte | SAMSON Boutique</title>
  <meta name="description" content="Votre espace SAMSON Boutique : historique de commandes, favoris et adresses.">
  <meta name="theme-color" content="#FF6B00">
  <meta name="robots" content="noindex">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FF6B00'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/themes.css">
</head>
<body>
  <div id="sb-header"></div>

  <div class="page-band"><div class="container"><h1>Mon compte</h1><p>Vos commandes et favoris, sauvegardés sur cet appareil</p></div></div>

  <main class="section" style="padding-top:24px">
    <div class="container">
      <div class="account-layout" id="account-layout">
        <nav class="account-nav">
          <button class="active" data-panel="panel-commandes">📦 Mes commandes</button>
          <button data-panel="panel-wishlist">❤️ Mes favoris</button>
          <button data-panel="panel-adresses">📍 Mes adresses</button>
          <button data-panel="panel-infos">⚙️ Informations</button>
        </nav>
        <div>
          <div class="account-panel active" id="panel-commandes"></div>
          <div class="account-panel" id="panel-wishlist"></div>
          <div class="account-panel" id="panel-adresses">
            <div class="step-card">
              <h3>📍 Mes adresses</h3>
              <p class="muted">Enregistrez une adresse de livraison pour aller plus vite au prochain achat.</p>
              <form data-fake-form="Adresse enregistrée sur cet appareil." style="margin-top:16px">
                <div class="field"><label>Libellé</label><input class="input" placeholder="Ex : Maison, Bureau…"></div>
                <div class="field"><label>Commune</label><input class="input" placeholder="Ex : Cocody"></div>
                <div class="field"><label>Adresse / point de repère</label><input class="input" placeholder="Ex : Angré, en face de la pharmacie"></div>
                <button class="btn btn-primary" type="submit">Enregistrer l'adresse</button>
              </form>
            </div>
          </div>
          <div class="account-panel" id="panel-infos">
            <div class="step-card">
              <h3>⚙️ Informations</h3>
              <p class="muted">Ces informations restent sur votre appareil (localStorage). SAMSON Boutique ne stocke aucune donnée sur un serveur.</p>
              <form data-fake-form="Informations mises à jour." style="margin-top:16px">
                <div class="field"><label>Nom</label><input class="input" placeholder="Votre nom"></div>
                <div class="field"><label>Téléphone</label><input class="input" inputmode="tel" placeholder="07 00 00 00 00"></div>
                <button class="btn btn-primary" type="submit">Mettre à jour</button>
              </form>
              <button class="btn btn-ghost btn-sm" style="margin-top:14px" onclick="if(confirm('Effacer toutes vos données locales (panier, favoris, commandes) ?')){localStorage.clear();location.reload()}">🗑️ Effacer mes données locales</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="sb-footer"></div>

  <script src="assets/js/data/products.js"></script>
  <script src="assets/js/modules/storage.js"></script>
  <script src="assets/js/modules/security.js"></script>
  <script src="assets/js/modules/toast.js"></script>
  <script src="assets/js/modules/theme.js"></script>
  <script src="assets/js/modules/wishlist.js"></script>
  <script src="assets/js/modules/cart.js"></script>
  <script src="assets/js/modules/search.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
