# ==========================================================================
# deploy/nginx/coachlink.conf — Server block Nginx + PHP-FPM (HTTPS).
#
# Nginx n'utilise pas .htaccess : les règles de réécriture de l'API sont donc
# explicites ci-dessous.
#
# Installation (Debian/Ubuntu) :
#   sudo cp deploy/nginx/coachlink.conf /etc/nginx/sites-available/coachlink
#   sudo ln -s /etc/nginx/sites-available/coachlink /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d coachlink.ci          # obtient/branche le certificat
#   # Adaptez la version du socket PHP-FPM (php8.2-fpm.sock…).
# ==========================================================================

server {
    listen 80;
    server_name coachlink.ci;
    return 301 https://$host$request_uri;   # HTTP → HTTPS
}

server {
    listen 443 ssl http2;
    server_name coachlink.ci;
    root /var/www/coachlink/coachlink;
    index index.html;

    # HTTPS (rempli/géré par certbot --nginx).
    ssl_certificate     /etc/letsencrypt/live/coachlink.ci/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coachlink.ci/privkey.pem;

    # En-têtes de sécurité (l'API en ajoute aussi côté PHP).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 10m;   # aligné sur max_upload (8 Mo + marge)

    # Front statique.
    location / {
        try_files $uri $uri/ =404;
    }

    # Fichiers téléversés servis directement.
    location /api/uploads/ {
        try_files $uri =404;
    }

    # API : tout /api/* passe par le front controller PHP.
    location /api/ {
        try_files $uri /api/index.php$is_args$args;
    }
    location = /api/index.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/api/index.php;
    }

    # Ne jamais exposer la configuration ni la base.
    location ~* ^/api/(config|database)/ { deny all; return 404; }

    access_log /var/log/nginx/coachlink_access.log;
    error_log  /var/log/nginx/coachlink_error.log;
}
