# ==========================================================================
# deploy/apache/coachlink.conf — VirtualHost Apache 2.4 (HTTPS).
#
# Le front (statique) est servi à la racine ; /api est un sous-dossier dont le
# .htaccess réécrit tout vers index.php (nécessite AllowOverride All).
#
# Installation (Debian/Ubuntu) :
#   sudo cp deploy/apache/coachlink.conf /etc/apache2/sites-available/
#   sudo a2enmod rewrite ssl headers
#   sudo a2ensite coachlink && sudo systemctl reload apache2
#   sudo certbot --apache -d coachlink.ci        # obtient/branche le certificat
# ==========================================================================

<VirtualHost *:80>
    ServerName coachlink.ci
    # Redirige tout le trafic HTTP vers HTTPS.
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName coachlink.ci
    DocumentRoot /var/www/coachlink/coachlink

    <Directory /var/www/coachlink/coachlink>
        AllowOverride All
        Require all granted
        Options -Indexes -MultiViews +FollowSymLinks
    </Directory>

    # Ne jamais exposer la configuration ni la base SQLite.
    <DirectoryMatch "^/var/www/coachlink/coachlink/api/(config|database)">
        Require all denied
    </DirectoryMatch>

    # En-têtes de sécurité (l'API en ajoute aussi côté PHP).
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"

    # HTTPS (rempli/géré par certbot --apache).
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/coachlink.ci/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/coachlink.ci/privkey.pem

    ErrorLog  ${APACHE_LOG_DIR}/coachlink_error.log
    CustomLog ${APACHE_LOG_DIR}/coachlink_access.log combined
</VirtualHost>
