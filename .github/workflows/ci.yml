name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.4']
    defaults:
      run:
        working-directory: coachlink/api
    steps:
      - uses: actions/checkout@v4

      - name: Configurer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, mbstring, json
          coverage: none
          tools: composer:v2

      - name: Lint PHP (php -l)
        run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Installer les dépendances de dev
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Vérifier la migration (SQLite)
        run: |
          printf "<?php return ['db'=>['driver'=>'sqlite','sqlite_path'=>__DIR__.'/../database/ci.sqlite'],'jwt_secret'=>'ci-secret-longue-chaine','jwt_ttl'=>3600,'cors_origins'=>['*'],'uploads_dir'=>__DIR__.'/../uploads','uploads_url'=>'/uploads','max_upload'=>8388608];\n" > config/config.php
          php database/migrate.php

      - name: Lancer PHPUnit
        run: vendor/bin/phpunit

  frontend:
    name: Frontend — lint JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vérification de syntaxe (node --check)
        run: find coachlink/js -name '*.js' -print0 | xargs -0 -n1 node --check
