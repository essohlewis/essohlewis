<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes ventes — Marché CI</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/tailwind.css" />
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-2">
      <a href="/" class="flex items-center gap-2"><span class="text-2xl">🛒</span><span class="font-extrabold text-lg">Marché<span class="text-brand">CI</span></span></a>
      <span class="ml-auto pill bg-brand/10 text-brand" style="background:rgba(234,88,12,.12)">Espace vendeur</span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-extrabold">📈 Mes ventes</h1>
      <button id="refresh" class="btn btn-ghost !py-1.5 !px-4 text-sm">↻ Rafraîchir</button>
    </div>

    <div id="noauth" class="card hidden text-center">
      <p class="text-slate-600">Connectez-vous sur la marketplace et créez votre boutique pour suivre vos ventes.</p>
      <a href="/" class="btn btn-brand mt-3">Aller à la marketplace</a>
    </div>

    <div id="app" class="hidden">
      <div id="storehead" class="card mb-4"></div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5" id="stats"></div>
      <div id="wallet" class="mb-5"></div>
      <h2 class="font-bold mb-2">Articles vendus</h2>
      <div id="lines" class="space-y-2"></div>
      <p id="empty" class="text-center text-slate-400 py-10 hidden">Aucune vente pour l'instant.</p>
    </div>
    <a href="/" class="btn btn-ghost mt-6">← Retour à la marketplace</a>
  </main>

  <script>
    const TOKEN_KEY = "marchesci_shopToken";
    const $ = (s) => document.querySelector(s);
    const fcfa = (n) => (n || 0).toLocaleString("fr-FR") + " FCFA";
    const token = () => { try { return localStorage.getItem(TOKEN_KEY) || ""; } catch (e) { return ""; } };
    const STATUS = { pending: ["En attente", "bg-amber-100 text-amber-700"], confirmed: ["Confirmée", "bg-sky-100 text-sky-700"],
      shipped: ["Expédiée", "bg-indigo-100 text-indigo-700"], delivered: ["Livrée", "bg-accent-soft text-accent"], cancelled: ["Annulée", "bg-red-100 text-red-700"] };
    const STORE_STATUS = { pending: ["⏳ En attente de validation", "bg-amber-100 text-amber-700"], approved: ["✅ Boutique approuvée", "bg-accent-soft text-accent"], suspended: ["⛔ Suspendue", "bg-red-100 text-red-700"] };

    async function load() {
      const t = token();
      if (!t) { $("#noauth").classList.remove("hidden"); $("#app").classList.add("hidden"); return; }
      const r = await fetch("/api/shop/vendor/sales", { headers: { Authorization: "Bearer " + t } });
      if (r.status === 401) { $("#noauth").classList.remove("hidden"); $("#app").classList.add("hidden"); return; }
      const j = await r.json();
      if (!j.store) { $("#noauth").classList.remove("hidden"); $("#noauth").querySelector("p").textContent = "Vous n'avez pas encore de boutique enregistrée en base."; $("#app").classList.add("hidden"); return; }
      $("#noauth").classList.add("hidden"); $("#app").classList.remove("hidden");

      const st = STORE_STATUS[j.store.status] || ["", "bg-slate-200 text-slate-600"];
      const kycBadge = j.store.sellable
        ? `<span class="pill bg-accent-soft text-accent">🛡️ Identité vérifiée</span>`
        : `<span class="pill bg-red-100 text-red-700">🛡️ Identité non vérifiée</span>`;
      $("#storehead").innerHTML = `<div class="flex items-center justify-between flex-wrap gap-2">
        <div><div class="text-lg font-extrabold">${j.store.name}</div>
          <div class="text-xs text-slate-500">${j.store.category || ""}${j.store.commune ? " · " + j.store.commune : ""}</div></div>
        <div class="flex flex-wrap gap-1.5">${kycBadge}<span class="pill ${st[1]}">${st[0]}</span></div></div>`;
      // Blocage de la vente tant que l'identité n'est pas validée.
      if (!j.store.sellable) {
        const verify = "/verify?vendorId=" + encodeURIComponent(j.store.ownerId || "") + "&storeId=" + encodeURIComponent(j.store.id) + "&vendorName=" + encodeURIComponent(j.store.name || "");
        const reason = j.store.kycStatus === "rejected" ? "Votre vérification d'identité a été refusée. Merci de la refaire."
          : j.store.kycStatus === "pending" ? "Votre vérification d'identité est en cours d'examen."
          : j.store.status !== "approved" ? "Votre boutique est en attente de validation par l'administration."
          : "Vérifiez votre identité pour activer la vente sur votre boutique.";
        $("#storehead").insertAdjacentHTML("afterend",
          `<div class="card border-l-4 border-red-500 bg-red-50 mb-4"><div class="flex items-center justify-between flex-wrap gap-2">
            <div><strong class="text-red-700">🚫 Vente désactivée</strong><div class="text-sm text-red-700/90 mt-0.5">${reason} Tant que ce n'est pas résolu, vos articles ne sont pas visibles et aucune commande ne peut être passée.</div></div>
            ${j.store.kycStatus !== "pending" ? `<a href="${verify}" class="btn btn-brand">Vérifier mon identité →</a>` : ""}</div></div>`);
      }

      const s = j.summary || {};
      const card = (icon, label, val) => `<div class="card !p-4"><div class="text-2xl">${icon}</div><div class="text-xl font-extrabold mt-1">${val}</div><div class="text-xs text-slate-500">${label}</div></div>`;
      $("#stats").innerHTML = card("🧾", "Commandes", s.orders || 0) + card("📦", "Articles vendus", s.units || 0)
        + card("💰", "Revenu encaissé", fcfa(s.revenue)) + card("⏳", "En attente", fcfa(s.pending));

      renderWallet();

      const lines = j.lines || [];
      $("#empty").classList.toggle("hidden", lines.length > 0);
      $("#lines").innerHTML = lines.map((l) => {
        const stt = STATUS[l.status] || [l.status, "bg-slate-200 text-slate-600"];
        return `<div class="card !py-3 flex items-center justify-between flex-wrap gap-2">
          <div><div class="font-semibold">${l.name} <span class="text-slate-400">×${l.qty}</span></div>
            <div class="text-xs text-slate-500">${l.customerName || "Client"}${l.city ? " · " + l.city : ""} · ${new Date(l.createdAt).toLocaleDateString("fr-FR")}</div></div>
          <div class="flex items-center gap-3"><span class="pill ${stt[1]}">${stt[0]}</span><span class="font-extrabold">${fcfa(l.price * l.qty)}</span></div>
        </div>`;
      }).join("");
    }
    const PO_ST = { requested: ["En attente", "bg-amber-100 text-amber-700"], paid: ["Payé", "bg-accent-soft text-accent"], rejected: ["Refusé", "bg-red-100 text-red-700"] };
    async function renderWallet() {
      const j = await (await fetch("/api/shop/vendor/wallet", { headers: { Authorization: "Bearer " + token() } })).json();
      if (!j.wallet) { $("#wallet").innerHTML = ""; return; }
      const w = j.wallet;
      const tile = (icon, label, val, cls) => `<div class="card !p-4"><div class="text-2xl">${icon}</div><div class="text-xl font-extrabold mt-1 ${cls || ""}">${fcfa(val)}</div><div class="text-xs text-slate-500">${label}</div></div>`;
      const payouts = (j.payouts || []).map((p) => { const st = PO_ST[p.status] || [p.status, "bg-slate-200 text-slate-600"];
        return `<div class="flex items-center justify-between text-sm py-1.5 border-t border-slate-100"><span>${new Date(p.createdAt).toLocaleDateString("fr-FR")} · ${p.method}</span><span class="flex items-center gap-2"><span class="pill ${st[1]}">${st[0]}</span><b>${fcfa(p.amount)}</b></span></div>`;
      }).join("");
      $("#wallet").innerHTML = `
        <h2 class="font-bold mb-2">💰 Portefeuille <span class="text-xs font-normal text-slate-400">commission plateforme ${Math.round(w.commissionRate * 100)} %</span></h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          ${tile("🔒", "En attente de livraison (escrow)", w.escrow, "text-slate-700")}
          ${tile("✅", "Disponible au retrait", w.available, "text-accent")}
          ${tile("🏦", "Déjà retiré", w.paidOut)}
          ${tile("🧾", "Commission prélevée", w.commission, "text-slate-500")}
        </div>
        <div class="card mt-3">
          <div class="flex items-end gap-2 flex-wrap">
            <label class="flex-1 min-w-[140px]"><span class="text-sm font-semibold">Demander un retrait</span>
              <input id="poAmount" type="number" max="${w.available}" placeholder="Montant (max ${w.available})" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2" /></label>
            <label class="min-w-[130px]"><span class="text-sm font-semibold">Vers</span>
              <select id="poMethod" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2"><option value="orange">Orange Money</option><option value="mtn">MTN MoMo</option><option value="moov">Moov Money</option><option value="wave">Wave</option><option value="bank">Virement bancaire</option></select></label>
            <button id="poBtn" class="btn btn-brand" ${w.available <= 0 ? "disabled" : ""}>Retirer</button>
          </div>
          <p id="poMsg" class="text-sm mt-2"></p>
          ${payouts ? `<div class="mt-3"><div class="text-xs font-bold text-slate-500 uppercase tracking-wide">Historique des retraits</div>${payouts}</div>` : ""}
        </div>`;
      const btn = $("#poBtn");
      if (btn) btn.addEventListener("click", async () => {
        const amount = parseInt($("#poAmount").value, 10) || 0;
        const msg = $("#poMsg");
        if (amount <= 0) { msg.className = "text-sm mt-2 text-red-600"; msg.textContent = "Saisissez un montant."; return; }
        btn.disabled = true;
        const r = await (await fetch("/api/shop/vendor/payouts", { method: "POST", headers: { "Content-Type": "application/json", Authorization: "Bearer " + token() }, body: JSON.stringify({ amount, method: $("#poMethod").value }) })).json();
        if (r.ok) { msg.className = "text-sm mt-2 text-accent"; msg.textContent = "✅ Demande de retrait envoyée."; renderWallet(); }
        else { msg.className = "text-sm mt-2 text-red-600"; msg.textContent = r.error || "Échec."; btn.disabled = false; }
      });
    }

    $("#refresh").addEventListener("click", load);
    load();
  </script>
</body>
</html>
