<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revue des vérifications — Admin Marché CI</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/tailwind.css" />
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <header class="bg-slate-900 text-white">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-2">
      <span class="text-xl">🛡️</span><span class="font-extrabold">Administration — Vérifications d'identité</span>
      <span id="faceState" class="ml-auto pill bg-slate-700 text-slate-200">…</span>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <div id="auth" class="card max-w-md mx-auto">
      <h1 class="text-lg font-bold mb-2">Accès administrateur</h1>
      <p class="text-sm text-slate-500 mb-3">Saisissez le jeton d'administration pour accéder à la file de vérifications.</p>
      <input id="token" type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="Jeton admin" />
      <button id="login" class="btn btn-brand mt-3 w-full">Accéder</button>
      <p id="authErr" class="text-sm text-red-600 mt-2 hidden">Jeton incorrect.</p>
    </div>

    <div id="app" class="hidden">
      <div class="flex items-center gap-2 mb-4">
        <div class="flex gap-1 text-sm" id="tabs">
          <button data-f="pending" class="btn btn-brand !py-1.5 !px-4">En attente</button>
          <button data-f="approved" class="btn btn-ghost !py-1.5 !px-4">Approuvées</button>
          <button data-f="rejected" class="btn btn-ghost !py-1.5 !px-4">Refusées</button>
        </div>
        <button id="refresh" class="btn btn-ghost !py-1.5 !px-4 ml-auto">↻ Rafraîchir</button>
      </div>
      <div id="list" class="space-y-4"></div>
      <p id="empty" class="text-center text-slate-400 py-10 hidden">Aucune vérification.</p>
    </div>
  </main>

  <script>
    let TOKEN = new URLSearchParams(location.search).get("token") || "";
    let FILTER = "pending";
    const $ = (s) => document.querySelector(s);
    const H = () => ({ "X-Admin-Token": TOKEN });

    async function health() {
      try { const j = await (await fetch("/api/kyc/health")).json();
        $("#faceState").textContent = j.face ? "🤖 Reconnaissance faciale active" : "Revue manuelle (IA indisponible)";
      } catch (e) {}
    }
    async function login() {
      TOKEN = $("#token").value.trim() || TOKEN;
      const r = await fetch("/api/kyc/list?status=pending", { headers: H() });
      if (r.status === 401) { $("#authErr").classList.remove("hidden"); return; }
      $("#auth").classList.add("hidden"); $("#app").classList.remove("hidden"); load();
    }
    function badge(it) {
      if (!it.faceAvailable) return `<span class="pill bg-slate-200 text-slate-600">À vérifier manuellement</span>`;
      return it.match ? `<span class="pill bg-accent-soft text-accent">✅ Visages concordants · ${it.score}</span>`
                      : `<span class="pill bg-red-100 text-red-700">⚠️ Non concordants · ${it.score}</span>`;
    }
    function liveBadge(it) {
      const lv = it.liveness;
      if (!lv || !lv.available) return "";
      return lv.live
        ? `<span class="pill bg-accent-soft text-accent">🎥 Présence en direct${lv.blink ? " · clignement" : ""}${lv.motion ? " · mouvement" : ""}</span>`
        : `<span class="pill bg-red-100 text-red-700">🚫 Vivacité non confirmée (photo ?)</span>`;
    }
    function card(it) {
      const img = (u, cap) => `<figure class="m-0"><figcaption class="text-xs font-bold text-slate-500 mb-1">${cap}</figcaption>
        <img src="${u}?token=${encodeURIComponent(TOKEN)}" class="w-full aspect-square object-cover rounded-lg border border-slate-200 cursor-zoom-in" onclick="window.open(this.src)" alt="" /></figure>`;
      const actions = it.status === "pending"
        ? `<div class="flex gap-2 mt-3"><button class="btn btn-accent !py-1.5" data-ok="${it.id}">✔️ Valider</button>
             <button class="btn btn-ghost !py-1.5 !border-red-300 !text-red-600" data-no="${it.id}">Refuser</button></div>`
        : `<div class="mt-3 text-sm text-slate-500">${it.status === "approved" ? "✅ Approuvée" : "❌ Refusée"}${it.reason ? " — " + it.reason : ""}</div>`;
      return `<div class="card">
        <div class="flex items-center justify-between flex-wrap gap-2 mb-3">
          <div><strong>${it.vendorName || it.vendorId}</strong>
            <div class="text-xs text-slate-500">${it.idType || "Pièce"}${it.idNumber ? " · N° " + it.idNumber : ""} · ${new Date(it.createdAt).toLocaleString("fr-FR")}</div></div>
          <div class="flex flex-wrap gap-1.5">${badge(it)}${liveBadge(it)}</div>
        </div>
        <div class="grid grid-cols-2 gap-3">${img(it.idImageUrl, "Pièce d'identité")}${img(it.selfieUrl, "Selfie (live)")}</div>
        <div class="text-xs text-slate-500 mt-2">Visage détecté (client) : ${it.faceDetected ? "oui" : "non"}${it.distance != null ? " · distance biométrique : " + it.distance : ""}</div>
        ${actions}</div>`;
    }
    async function load() {
      const r = await fetch("/api/kyc/list?status=" + FILTER, { headers: H() });
      const j = await r.json();
      const items = j.items || [];
      $("#empty").classList.toggle("hidden", items.length > 0);
      $("#list").innerHTML = items.map(card).join("");
      $("#list").querySelectorAll("[data-ok]").forEach((b) => b.addEventListener("click", () => review(b.getAttribute("data-ok"), "approve")));
      $("#list").querySelectorAll("[data-no]").forEach((b) => b.addEventListener("click", () => {
        const reason = prompt("Motif du refus (optionnel) :") || ""; review(b.getAttribute("data-no"), "reject", reason);
      }));
    }
    async function review(id, decision, reason) {
      await fetch("/api/kyc/review", { method: "POST", headers: Object.assign({ "Content-Type": "application/json" }, H()), body: JSON.stringify({ id, decision, reason }) });
      load();
    }
    $("#login").addEventListener("click", login);
    $("#token").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    $("#refresh").addEventListener("click", load);
    document.querySelectorAll("#tabs [data-f]").forEach((b) => b.addEventListener("click", () => {
      FILTER = b.getAttribute("data-f");
      document.querySelectorAll("#tabs [data-f]").forEach((x) => x.className = "btn btn-ghost !py-1.5 !px-4");
      b.className = "btn btn-brand !py-1.5 !px-4"; load();
    }));
    health();
    if (TOKEN) login();
  </script>
</body>
</html>
