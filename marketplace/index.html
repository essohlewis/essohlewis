<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f97316" />
  <meta name="description" content="Marché CI — Marketplace multi-vendeurs en Côte d'Ivoire. Paiement à la livraison." />
  <title>Marché CI — Marketplace multi-vendeurs</title>

  <!-- Feuilles de style : thème (variables + clair/sombre), style général, responsive -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- ================= EN-TÊTE (desktop + mobile top) ================= -->
  <header class="app-header" id="appHeader">
    <div class="header-inner">
      <a href="#/" class="brand" aria-label="Accueil Marché CI">
        <span class="brand-mark">🛒</span>
        <span class="brand-name">Marché<span class="brand-accent">CI</span></span>
      </a>
      <span class="seller-flag" id="sellerFlag" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 4h16l1 5-2 1v10H5V10L3 9zm3 8v6h4v-4h2v4h4v-6z"/></svg>
        Espace Vendeur
      </span>

      <form class="header-search" id="headerSearchForm" role="search">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        <input type="search" id="headerSearchInput" placeholder="Rechercher un article, une boutique…" autocomplete="off" />
        <button type="button" class="mic-btn" id="micBtn" title="Recherche vocale" aria-label="Recherche vocale">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V22h2v-3.08A7 7 0 0 0 19 12z"/></svg>
        </button>
        <div class="search-suggest" id="searchSuggest" hidden></div>
      </form>

      <nav class="header-actions">
        <button class="icon-btn" id="themeToggle" title="Basculer le thème" aria-label="Basculer le thème">
          <svg class="ico-sun" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5zm0-5v2m0 16v2M4.2 4.2l1.4 1.4m12.8 12.8l1.4 1.4M2 12h2m16 0h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
          <svg class="ico-moon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12.3 2a10 10 0 1 0 9.7 12.3A8 8 0 0 1 12.3 2z"/></svg>
        </button>

        <button class="icon-btn has-badge" id="navFavorites" title="Favoris" aria-label="Favoris">
          <svg viewBox="0 0 24 24" width="21" height="21"><path fill="currentColor" d="M12 21s-6.7-4.35-9.33-8.36C.9 9.7 2.1 6 5.4 6a4.3 4.3 0 0 1 3.6 2 4.3 4.3 0 0 1 3.6-2c3.3 0 4.5 3.7 2.73 6.64C18.7 16.65 12 21 12 21z"/></svg>
          <span class="badge" id="favBadge" hidden>0</span>
        </button>

        <button class="icon-btn has-badge" id="navNotif" title="Notifications" aria-label="Notifications">
          <svg viewBox="0 0 24 24" width="21" height="21"><path fill="currentColor" d="M12 22a2.1 2.1 0 0 0 2.1-2H9.9A2.1 2.1 0 0 0 12 22zm6.3-6v-5a6.3 6.3 0 0 0-4.8-6.12V4a1.5 1.5 0 1 0-3 0v.88A6.3 6.3 0 0 0 5.7 11v5l-1.7 1.7v.8h16v-.8z"/></svg>
          <span class="badge" id="notifBadge" hidden>0</span>
        </button>

        <button class="icon-btn has-badge" id="navCart" title="Panier" aria-label="Panier">
          <svg viewBox="0 0 24 24" width="21" height="21"><path fill="currentColor" d="M7 18a2 2 0 1 0 2 2 2 2 0 0 0-2-2zm10 0a2 2 0 1 0 2 2 2 2 0 0 0-2-2zM7.16 14h9.45a2 2 0 0 0 1.9-1.37L21 6H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44A2 2 0 0 0 8 18h12v-2H8z"/></svg>
          <span class="badge" id="cartBadge" hidden>0</span>
        </button>

        <div class="user-menu" id="userMenu">
          <button class="avatar-btn" id="avatarBtn" aria-label="Mon compte">
            <span id="avatarInitials">?</span>
          </button>
          <div class="user-dropdown" id="userDropdown" hidden></div>
        </div>
      </nav>
    </div>
  </header>

  <!-- ================= COQUE PRINCIPALE ================= -->
  <div class="app-shell">
    <!-- Barre latérale des filtres (desktop, contextuelle) -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Zone de rendu des vues (routeur SPA) -->
    <main class="view" id="view" aria-live="polite"></main>
  </div>

  <!-- ================= NAVIGATION BASSE (mobile) ================= -->
  <nav class="bottom-nav" id="bottomNav">
    <a href="#/" class="bn-item" data-route="#/">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3 2 12h3v8h6v-6h2v6h6v-8h3z"/></svg>
      <span>Accueil</span>
    </a>
    <a href="#/search" class="bn-item" data-route="#/search">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zM9.5 14A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
      <span>Recherche</span>
    </a>
    <a href="#/cart" class="bn-item bn-cart" data-route="#/cart">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 18a2 2 0 1 0 2 2 2 2 0 0 0-2-2zm10 0a2 2 0 1 0 2 2 2 2 0 0 0-2-2zM7.16 14h9.45a2 2 0 0 0 1.9-1.37L21 6H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44A2 2 0 0 0 8 18h12v-2H8z"/></svg>
      <span>Panier</span>
      <span class="badge" id="cartBadgeMobile" hidden>0</span>
    </a>
    <a href="#/notifications" class="bn-item" data-route="#/notifications">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 22a2.1 2.1 0 0 0 2.1-2H9.9A2.1 2.1 0 0 0 12 22zm6.3-6v-5a6.3 6.3 0 0 0-4.8-6.12V4a1.5 1.5 0 1 0-3 0v.88A6.3 6.3 0 0 0 5.7 11v5l-1.7 1.7v.8h16v-.8z"/></svg>
      <span>Alertes</span>
      <span class="badge" id="notifBadgeMobile" hidden>0</span>
    </a>
    <a href="#/profile" class="bn-item" data-route="#/profile">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/></svg>
      <span>Profil</span>
    </a>
  </nav>

  <!-- ========= NAVIGATION BASSE VENDEUR (mobile, mode vendeur) ========= -->
  <!-- Menu propre à l'espace vendeur, distinct de la nav client. Rempli par app.js. -->
  <nav class="seller-bottom-nav" id="sellerBottomNav" aria-label="Navigation vendeur"></nav>

  <!-- Conteneurs pour toasts, modales et barre de comparaison -->
  <div class="toast-wrap" id="toastWrap" aria-live="assertive"></div>
  <div class="modal-root" id="modalRoot"></div>
  <div id="compareBarRoot"></div>

  <!-- ================= SCRIPTS (ordre de dépendance) ================= -->
  <!-- Aucune dépendance externe. Namespace global MP. Scripts classiques (compatibles file://). -->
  <script src="js/db.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/products.js"></script>
  <script src="js/coupons.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/client.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
